<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Dark Mediterranean background -->
  <rect width="512" height="512" rx="96" fill="#1F1915"/>

  <!-- Subtle terracotta accent lines -->
  <rect x="120" y="84" width="272" height="1.5" rx="0.75" fill="#C96B2E" opacity="0.45"/>
  <rect x="120" y="426" width="272" height="1.5" rx="0.75" fill="#C96B2E" opacity="0.45"/>

  <!-- Stylized serif lowercase "f" -->
  <g transform="translate(256, 256)">
    <!-- Main vertical stem -->
    <rect x="-16" y="-120" width="32" height="270" rx="3" fill="#D4B896"/>

    <!-- Top hook/curve -->
    <path d="M 16,-120 C 16,-120 16,-165 60,-165 C 100,-165 100,-125 100,-120"
          stroke="#D4B896" stroke-width="30" fill="none" stroke-linecap="round"/>

    <!-- Crossbar -->
    <rect x="-56" y="-62" width="128" height="24" rx="3" fill="#D4B896"/>

    <!-- Bottom serif — left -->
    <path d="M -16,150 Q -16,146 -50,146 L -50,150 Q -50,154 -46,154 L -16,154 Z" fill="#D4B896"/>
    <!-- Bottom serif — right -->
    <path d="M 16,150 Q 16,146 50,146 L 50,150 Q 50,154 46,154 L 16,154 Z" fill="#D4B896"/>
    <!-- Base line -->
    <rect x="-50" y="148" width="100" height="6" rx="2" fill="#D4B896"/>
  </g>
</svg>
